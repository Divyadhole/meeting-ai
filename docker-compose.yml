services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      MEETING_AI_DB: /data/meeting_ai.db
    volumes: ["meeting-data:/data"]
  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports: ["6333:6333"]
  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
volumes:
  meeting-data:
